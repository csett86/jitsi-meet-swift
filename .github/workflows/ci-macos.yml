name: macOS build (scaffolding)

# Manual-only scaffolding for whoever has macOS CI minutes. This is NEVER a gate
# for the Linux-first workflow — the Apple-only targets (JitsiMedia, JitsiApp)
# and the stasel/WebRTC dependency only exist when Package.swift is evaluated on
# macOS. Wire up the full xcodebuild of the app here as Phase 2+/4 land.
on:
  workflow_dispatch:

jobs:
  macos:
    name: macOS (JitsiCore + JitsiMedia)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - name: Swift version
        run: swift --version

      - name: Build (JitsiCore + JitsiMedia)
        run: swift build

      - name: Test JitsiCore
        run: swift test --filter JitsiCoreTests

      # TODO (Phase 4): xcodebuild the JitsiApp scheme once the Xcode project exists.
      # - name: Build the app
      #   run: xcodebuild -scheme JitsiApp -destination 'platform=macOS' build
