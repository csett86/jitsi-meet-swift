name: macOS

# Runs on every PR (and on demand) so the Apple-only targets are exercised —
# the stasel/WebRTC link and JitsiMedia/JitsiApp compile only happen when
# Package.swift is evaluated on macOS. It reports status but is NOT the required
# merge gate (that stays the Linux `CI` workflow); make it required via branch
# protection only if you choose to. Wire up the full xcodebuild of the app here
# as Phase 2+/4 land.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  macos:
    name: macOS (JitsiCore + JitsiMedia)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - name: Swift version
        run: swift --version

      - name: Build (JitsiCore + JitsiMedia)
        run: swift build

      - name: Test (JitsiCore + JitsiMedia)
        run: swift test

      # TODO (Phase 4): xcodebuild the JitsiApp scheme once the Xcode project exists.
      # - name: Build the app
      #   run: xcodebuild -scheme JitsiApp -destination 'platform=macOS' build
