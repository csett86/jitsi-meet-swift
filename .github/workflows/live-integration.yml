name: Live integration (jitsi.luki.org)

# [CLOUD-LIVE] — NON-GATING, MANUAL ONLY. Runs the live signaling tests and the
# drift check against the real, volunteer-run jitsi.luki.org.
#
# There is intentionally NO `schedule:` trigger. jitsi.luki.org is someone
# else's production community server (see docs/live-testing.md) — never point an
# unattended cron at it. Run this by hand, sparingly, in dedicated rooms.
on:
  workflow_dispatch:
    inputs:
      test_url:
        description: "Full conference URL (dedicated room, per docs/live-testing.md)"
        required: false
        default: "https://jitsi.luki.org/jitsimeetswiftcidispatch"

permissions:
  contents: read
  issues: write

jobs:
  live:
    name: Live signaling (non-blocking)
    runs-on: macos-latest
    # Never fail the overall run — this depends on a third-party server we do
    # not control and must not treat as a gate.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7

      - name: Live signaling tests (Swift)
        env:
          JITSI_LIVE_TESTS: "1"
          JITSI_TEST_URL: ${{ inputs.test_url }}
        run: swift test --filter JitsiLiveTests

      # Drift check (Python) — a single short client that compares the live
      # server's handshake markers to the committed fixture. Fails this step
      # (non-gating) on drift so fixtures get refreshed deliberately.
      - name: Drift check (Python)
        run: |
          pip install --quiet websockets
          python3 Tools/LiveCapture/python/drift_check.py "${{ inputs.test_url }}"
